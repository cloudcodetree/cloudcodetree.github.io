name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege by default; the deploy job elevates to contents:write itself.
permissions:
  contents: read

# Rapid feed pushes can queue overlapping runs; with force_orphan deploys,
# two racing pushes to gh-pages could interleave. Serialize per ref and drop
# superseded in-flight runs (only the newest commit's deploy matters).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Validate blog index
      run: node scripts/validate-blog.mjs

    - name: Build
      run: pnpm run build

    - name: Upload built site
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the push-to-main deploy gets write access; PR builds never do.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - name: Download built site
      uses: actions/download-artifact@v4
      with:
        name: site
        path: ./out

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        # Keep gh-pages a single commit (no per-deploy history) so the deploy
        # branch never accumulates old build artifacts.
        force_orphan: true
